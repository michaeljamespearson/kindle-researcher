name: Daily Kindle Research

on:
  schedule:
    # Runs at 6:00 AM ET (11:00 UTC) every weekday
    # Adjust to whenever you want it ready before your commute
    - cron: '0 11 * * 1-5'
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily research
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SHEETS_CREDS_JSON: ${{ secrets.GOOGLE_SHEETS_CREDS_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          KINDLE_EMAIL: ${{ secrets.KINDLE_EMAIL }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        run: python research_and_send.py
